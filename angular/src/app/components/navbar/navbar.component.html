<nav class="navbar navbar-expand-lg sb-topnav fixed-top" *ngIf="user">
  <a class="navbar-brand" routerLink="/app/dashboard">
    <div class="logo-icon">
      <i class="bi bi-calendar-check text-white" style="font-size:1rem"></i>
    </div>
    SmartBooking
  </a>

  <button class="navbar-toggler ms-auto me-2" type="button"
          data-bs-toggle="collapse" data-bs-target="#sbNavCollapse"
          aria-controls="sbNavCollapse" aria-expanded="false">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="sbNavCollapse">
    <ul class="navbar-nav me-auto ms-3 gap-1">

      <!-- Dashboard: todos -->
      <li class="nav-item">
        <a class="nav-link" routerLink="/app/dashboard" routerLinkActive="active">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
      </li>

      <!-- ROLE_PERSONA: Mis Reservas + Empresas -->
      <ng-container *ngIf="!user?.isAdmin && user?.userType === 'persona'">
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/bookings" routerLinkActive="active">
            <i class="bi bi-calendar3"></i> Mis Reservas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/empresas" routerLinkActive="active">
            <i class="bi bi-building"></i> Empresas
          </a>
        </li>
      </ng-container>

      <!-- ROLE_EMPRESA: Reservas recibidas + Mi empresa -->
      <ng-container *ngIf="!user?.isAdmin && user?.userType === 'empresa'">
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/bookings" routerLinkActive="active">
            <i class="bi bi-calendar3"></i> Reservas recibidas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/mi-empresa" routerLinkActive="active">
            <i class="bi bi-building-fill"></i> Mi empresa
          </a>
        </li>
      </ng-container>

      <!-- ROLE_ADMIN: todo -->
      <ng-container *ngIf="user?.isAdmin">
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/bookings" routerLinkActive="active">
            <i class="bi bi-calendar3"></i> Reservas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/resources" routerLinkActive="active">
            <i class="bi bi-building-fill"></i> Recursos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/categories" routerLinkActive="active">
            <i class="bi bi-tags-fill"></i> Categorías
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/app/empresas" routerLinkActive="active">
            <i class="bi bi-building"></i> Empresas
          </a>
        </li>
      </ng-container>

    </ul>

    <!-- Buscador de empresas: solo ROLE_PERSONA y ROLE_ADMIN -->
    <div class="d-flex align-items-center gap-2 me-2"
         *ngIf="user?.isAdmin || user?.userType === 'persona'">
      <div class="position-relative" style="width:220px">
        <div class="input-group input-group-sm">
          <span class="input-group-text"
                style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:#94a3b8">
            <i *ngIf="!searchLoading" class="bi bi-search"></i>
            <span *ngIf="searchLoading"
                  class="spinner-border spinner-border-sm"
                  style="width:.75rem;height:.75rem"></span>
          </span>
          <input
            type="text"
            class="form-control form-control-sm"
            placeholder="Buscar empresa..."
            [value]="searchQuery"
            (input)="onSearchInput($any($event.target).value)"
            style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:#e2e8f0"
            autocomplete="off"
          />
        </div>

        <div *ngIf="showDropdown"
             class="dropdown-menu show w-100 p-0 mt-1"
             style="max-height:280px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.3)">
          <button
            *ngFor="let emp of searchResults"
            class="dropdown-item d-flex align-items-center gap-2 py-2 px-3"
            (click)="selectEmpresa(emp)"
            type="button"
          >
            <div class="sb-user-avatar flex-shrink-0"
                 style="width:30px;height:30px;font-size:.8rem;min-width:30px">
              {{ getInitial(emp.nombreEmpresa) }}
            </div>
            <div class="overflow-hidden">
              <div class="fw-semibold text-truncate small">{{ emp.nombreEmpresa }}</div>
              <div class="text-muted" style="font-size:.7rem">{{ emp.sector || emp.cif }}</div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <div class="d-flex align-items-center gap-2">
      <button class="btn sb-theme-toggle" (click)="toggleTheme()" [title]="isDark ? 'Modo claro' : 'Modo oscuro'">
        <i class="bi" [ngClass]="isDark ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
      </button>
      <div class="dropdown">
        <button class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent"
                type="button" data-bs-toggle="dropdown">
          <div class="sb-user-avatar">{{ user?.initials }}</div>
          <div class="d-none d-lg-block text-start" style="line-height:1.2">
            <div style="font-size:.8rem;font-weight:600;color:#e2e8f0">{{ user?.displayName }}</div>
            <div style="font-size:.68rem;">
              <span *ngIf="user?.isAdmin" class="badge" style="background:rgba(239,68,68,.25);color:#fca5a5;font-size:.65rem">
                <i class="bi bi-shield-fill me-1"></i>Admin
              </span>
              <span *ngIf="!user?.isAdmin && user?.userType === 'empresa'" class="badge"
                    style="background:rgba(14,165,233,.2);color:#7dd3fc;font-size:.65rem">
                <i class="bi bi-building me-1"></i>Empresa
              </span>
              <span *ngIf="!user?.isAdmin && user?.userType === 'persona'" class="badge"
                    style="background:rgba(148,163,184,.15);color:#94a3b8;font-size:.65rem">
                <i class="bi bi-person-fill me-1"></i>Persona
              </span>
            </div>
          </div>
          <i class="bi bi-chevron-down d-none d-lg-inline" style="font-size:.65rem;color:#64748b"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end mt-2">
          <li *ngIf="user?.userType === 'empresa'">
            <a class="dropdown-item" routerLink="/app/mi-empresa">
              <i class="bi bi-building me-2 text-muted"></i>Mi empresa
            </a>
          </li>
          <li *ngIf="user?.userType === 'persona'">
            <a class="dropdown-item" routerLink="/app/perfil">
              <i class="bi bi-person-circle me-2 text-muted"></i>Mi perfil
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <button class="dropdown-item text-danger" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>
