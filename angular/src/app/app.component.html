<div *ngIf="loading && !isLoginPage" class="d-flex justify-content-center align-items-center" style="min-height:100vh">
  <div class="text-center">
    <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem" role="status"></div>
    <div class="text-muted small">Cargando SmartBooking…</div>
  </div>
</div>

<ng-container *ngIf="!loading || isLoginPage">
  <app-navbar *ngIf="!isLoginPage"></app-navbar>
  <main [class]="isLoginPage ? '' : 'sb-main-content'">
    <div [class]="isLoginPage ? '' : 'container-fluid'">
      <router-outlet></router-outlet>
    </div>
  </main>
</ng-container>
