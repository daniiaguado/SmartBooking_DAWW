name: CI - SmartBooking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-symfony:
    name: Symfony Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Instalar dependencias Composer
        working-directory: symfony
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Verificar sintaxis Twig
        working-directory: symfony
        run: php bin/console lint:twig templates/ --env=test
        continue-on-error: true

      - name: Verificar YAML
        working-directory: symfony
        run: php bin/console lint:yaml config/ --env=test
        continue-on-error: true

      - name: Symfony build OK
        run: echo "Symfony build completado correctamente"

  build-angular:
    name: Angular Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: angular/package-lock.json

      - name: Instalar dependencias npm
        working-directory: angular
        run: npm ci

      - name: Build Angular
        working-directory: angular
        run: npm run build

      - name: Verificar build generado
        run: |
          echo "Archivos generados en symfony/public/build/:"
          ls -la symfony/public/build/ || echo "Directorio build no encontrado"

      - name: Angular build OK
        run: echo "Angular build completado correctamente"
