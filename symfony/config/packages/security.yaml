security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_dashboard
                username_parameter: _email
                password_parameter: _password
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                always_remember_me: false

    access_control:
        - { path: ^/login,             roles: PUBLIC_ACCESS }
        - { path: ^/register,          roles: PUBLIC_ACCESS }
        - { path: ^/$,                 roles: PUBLIC_ACCESS }
        - { path: ^/app/login$,        roles: PUBLIC_ACCESS }
        - { path: ^/app/register$,     roles: PUBLIC_ACCESS }
        - { path: ^/api/login$,        roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/register$,     roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/check-email$,  roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/resources$,    roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/resources/,    roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/categories$,   roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/categories/,   roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api,               roles: ROLE_USER }
        - { path: ^/admin,             roles: ROLE_ADMIN }
        - { path: ^/,                  roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
