<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    ServerName localhost

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ index.php [QSA,L]
        </IfModule>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/smartbooking_error.log
    CustomLog ${APACHE_LOG_DIR}/smartbooking_access.log combined
</VirtualHost>
