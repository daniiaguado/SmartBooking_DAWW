version: '3.8'

services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: smartbooking_php
    restart: unless-stopped
    volumes:
      - ./symfony:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_SECRET: smartbooking_secret_32chars_change
      DATABASE_URL: "mysql://smartbooking:smartbooking@db:3306/smartbooking?serverVersion=8.0&charset=utf8mb4"
    networks:
      - smartbooking_net

  db:
    image: mysql:8.0
    container_name: smartbooking_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smartbooking
      MYSQL_USER: smartbooking
      MYSQL_PASSWORD: smartbooking
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartbooking_net

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: smartbooking_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - db
    networks:
      - smartbooking_net

  node:
    image: node:20-alpine
    container_name: smartbooking_node
    working_dir: /workspace/angular
    volumes:
      - ./:/workspace
    command: sh -c "npm install && npm run build"
    networks:
      - smartbooking_net

volumes:
  mysql_data:

networks:
  smartbooking_net:
    driver: bridge
