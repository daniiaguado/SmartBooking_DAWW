<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000022"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8fafc"/>

  <!-- Título principal -->
  <text x="600" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#1e293b">Arquitectura del Sistema — SmartBooking</text>
  <line x1="100" y1="58" x2="1100" y2="58" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── CAPA CLIENTE ── -->
  <rect x="80" y="75" width="1040" height="185" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="80" y="75" width="1040" height="42" rx="12" fill="#3b82f6"/>
  <rect x="80" y="105" width="1040" height="12" fill="#3b82f6"/>
  <text x="600" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">CLIENTE  (Navegador)</text>

  <!-- Caja Angular -->
  <rect x="180" y="128" width="840" height="115" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="600" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1d4ed8">Angular 17  SPA</text>
  <text x="600" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">LoginComponent  ·  RegisterComponent  ·  DashboardComponent</text>
  <text x="600" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">BookingsComponent  ·  EmpresasComponent  ·  PerfilComponent  ·  CalendarComponent</text>
  <text x="600" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Angular Router  ·  HttpClient  ·  AuthGuard  ·  Reactive Forms</text>
  <text x="600" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Bootstrap 5  ·  FontAwesome  ·  FullCalendar</text>

  <!-- FLECHA 1 -->
  <line x1="600" y1="264" x2="600" y2="308" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="480" y="272" width="240" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#475569" font-weight="bold">HTTP / JSON  (API REST)</text>

  <!-- ── CAPA SERVIDOR ── -->
  <rect x="80" y="312" width="1040" height="210" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="80" y="312" width="1040" height="42" rx="12" fill="#16a34a"/>
  <rect x="80" y="342" width="1040" height="12" fill="#16a34a"/>
  <text x="600" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">SERVIDOR  (Docker — Puerto 8080)</text>

  <!-- Caja Symfony -->
  <rect x="115" y="365" width="450" height="140" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="340" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#15803d">Symfony 7  (PHP 8.2)</text>
  <text x="340" y="412" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">API REST  (JSON)</text>
  <text x="340" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">Security Component  (sesiones PHP)</text>
  <text x="340" y="448" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">Doctrine ORM  (repositorios)</text>
  <text x="340" y="466" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">Controllers: Auth · Booking · Resource · Category</text>
  <text x="340" y="484" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Voters · Serializer · EventListeners</text>
  <text x="340" y="498" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Puerto 8080</text>

  <!-- Caja Angular Build -->
  <rect x="630" y="365" width="410" height="140" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="835" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#15803d">Angular Build  (SSR/SPA)</text>
  <text x="835" y="412" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">main.js  ·  polyfills.js</text>
  <text x="835" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">styles.css  ·  index.html</text>
  <text x="835" y="448" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">Servido por Symfony como assets</text>
  <text x="835" y="466" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Ruta: /app/*  (SPA routing)</text>
  <text x="835" y="484" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">public/browser/</text>

  <!-- FLECHA 2 -->
  <line x1="600" y1="526" x2="600" y2="570" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="470" y="534" width="260" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="553" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#475569" font-weight="bold">SQL  (Doctrine ORM / PDO)</text>

  <!-- ── CAPA BASE DE DATOS ── -->
  <rect x="80" y="574" width="1040" height="190" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="80" y="574" width="1040" height="42" rx="12" fill="#ca8a04"/>
  <rect x="80" y="604" width="1040" height="12" fill="#ca8a04"/>
  <text x="600" y="602" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">BASE DE DATOS  (MySQL 8.0 — Puerto 3307)</text>

  <!-- 4 tablas -->
  <rect x="115" y="625" width="215" height="120" rx="8" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
  <rect x="115" y="625" width="215" height="32" rx="8" fill="#fde68a"/>
  <rect x="115" y="649" width="215" height="8" fill="#fde68a"/>
  <text x="222" y="647" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#92400e">user</text>
  <text x="222" y="671" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">id · email · password</text>
  <text x="222" y="688" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">user_type · nombre · apellidos</text>
  <text x="222" y="705" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">dni · telefono · roles (JSON)</text>
  <text x="222" y="722" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">nombre_empresa · cif · sector</text>

  <rect x="370" y="625" width="215" height="120" rx="8" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
  <rect x="370" y="625" width="215" height="32" rx="8" fill="#fde68a"/>
  <rect x="370" y="649" width="215" height="8" fill="#fde68a"/>
  <text x="477" y="647" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#92400e">booking</text>
  <text x="477" y="671" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">id · user_id · resource_id</text>
  <text x="477" y="688" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">fecha_inicio · fecha_fin</text>
  <text x="477" y="705" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">estado · num_asistentes</text>
  <text x="477" y="722" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">precio_total · motivo</text>

  <rect x="625" y="625" width="215" height="120" rx="8" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
  <rect x="625" y="625" width="215" height="32" rx="8" fill="#fde68a"/>
  <rect x="625" y="649" width="215" height="8" fill="#fde68a"/>
  <text x="732" y="647" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#92400e">resource</text>
  <text x="732" y="671" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">id · category_id · nombre</text>
  <text x="732" y="688" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">descripcion · capacidad</text>
  <text x="732" y="705" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">precio_hora · disponible</text>

  <rect x="880" y="625" width="215" height="120" rx="8" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
  <rect x="880" y="625" width="215" height="32" rx="8" fill="#fde68a"/>
  <rect x="880" y="649" width="215" height="8" fill="#fde68a"/>
  <text x="987" y="647" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#92400e">category</text>
  <text x="987" y="671" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">id · nombre</text>
  <text x="987" y="688" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#374151">descripcion · color</text>

  <!-- Pie de página -->
  <text x="600" y="788" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">SmartBooking — Proyecto Final de Ciclo — 2026</text>
</svg>