<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="900" height="1200" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1e293b">Flujo de la Aplicación — SmartBooking</text>
  <line x1="80" y1="55" x2="820" y2="55" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- 1. INICIO -->
  <ellipse cx="450" cy="100" rx="80" ry="25" fill="#16a34a" stroke="#15803d" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="450" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">INICIO</text>

  <line x1="450" y1="126" x2="450" y2="152" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Accede login -->
  <rect x="255" y="158" width="390" height="52" rx="10" fill="white" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Usuario accede a /app/login</text>

  <line x1="450" y1="210" x2="450" y2="236" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Introduce credenciales -->
  <rect x="255" y="242" width="390" height="52" rx="10" fill="white" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="273" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Introduce email y contraseña</text>

  <line x1="450" y1="294" x2="450" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. POST login -->
  <rect x="255" y="326" width="390" height="52" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="357" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Angular envía POST /api/login</text>

  <line x1="450" y1="378" x2="450" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. ROMBO credenciales -->
  <polygon points="450,410 600,448 450,486 300,448" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="450" y="453" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1e293b">¿Credenciales válidas?</text>

  <!-- NO → error -->
  <line x1="600" y1="448" x2="770" y2="448" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="685" y="440" font-family="Arial,sans-serif" font-size="11" fill="#dc2626" font-weight="bold">NO</text>
  <rect x="690" y="420" width="170" height="56" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="775" y="444" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#dc2626">Mostrar</text><text x="775" y="462" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#dc2626">error 401</text>
  <!-- Flecha vuelta al paso 3 -->
  <line x1="690" y1="448" x2="690" y2="268" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,4"/>
  <line x1="690" y1="268" x2="645" y2="268" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="728" y="360" font-family="Arial,sans-serif" font-size="10" fill="#dc2626">reintentar</text>

  <!-- SÍ ↓ -->
  <text x="430" y="498" font-family="Arial,sans-serif" font-size="11" fill="#16a34a" font-weight="bold">SÍ</text>
  <line x1="450" y1="486" x2="450" y2="516" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. Sesión PHP -->
  <rect x="255" y="522" width="390" height="52" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="553" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Symfony crea sesión PHP</text>

  <line x1="450" y1="574" x2="450" y2="600" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Datos usuario -->
  <rect x="255" y="606" width="390" height="52" rx="10" fill="white" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="637" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Angular obtiene datos del usuario</text>

  <line x1="450" y1="658" x2="450" y2="690" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8. ROMBO rol -->
  <polygon points="450,690 600,728 450,766 300,728" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="450" y="733" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1e293b">¿Rol del usuario?</text>

  <!-- ROLE_PERSONA (izquierda) -->
  <line x1="300" y1="728" x2="90" y2="728" stroke="#475569" stroke-width="2"/>
  <line x1="90" y1="728" x2="90" y2="800" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="88" y="760" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#374151" font-weight="bold">ROLE_PERSONA</text>
  <rect x="15" y="806" width="160" height="90" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <text x="95" y="829" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Dashboard</text><text x="95" y="847" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Personal</text><text x="95" y="865" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">- Mis reservas</text><text x="95" y="883" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">- Buscar empresas</text>

  <!-- ROLE_EMPRESA (centro, ya está) -->
  <line x1="450" y1="766" x2="450" y2="800" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="458" y="788" font-family="Arial,sans-serif" font-size="10" fill="#374151" font-weight="bold">ROLE_EMPRESA</text>
  <rect x="370" y="806" width="160" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="829" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Dashboard</text><text x="450" y="847" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Empresa</text><text x="450" y="865" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">- Reservas recibidas</text><text x="450" y="883" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">- Mi empresa</text>

  <!-- ROLE_ADMIN (derecha) -->
  <line x1="600" y1="728" x2="810" y2="728" stroke="#475569" stroke-width="2"/>
  <line x1="810" y1="728" x2="810" y2="800" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="812" y="760" font-family="Arial,sans-serif" font-size="10" fill="#374151" font-weight="bold">ROLE_ADMIN</text>
  <rect x="725" y="806" width="160" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="805" y="829" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Dashboard</text><text x="805" y="847" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Admin</text><text x="805" y="865" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">- Gestion global</text><text x="805" y="883" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">- Usuarios</text>

  <!-- Convergencia a "Navegar por SPA" -->
  <line x1="95" y1="896" x2="95" y2="970" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="95" y1="970" x2="450" y2="970" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="450" y1="896" x2="450" y2="970" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="805" y1="896" x2="805" y2="970" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="805" y1="970" x2="450" y2="970" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="450" y1="970" x2="450" y2="990" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 9. Navegar SPA -->
  <rect x="255" y="996" width="390" height="52" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="1027" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1e293b">Navegar por la SPA</text>

  <line x1="450" y1="1048" x2="450" y2="1074" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 10. FIN -->
  <ellipse cx="450" cy="1110" rx="80" ry="25" fill="#dc2626" stroke="#b91c1c" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="450" y="1115" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">FIN</text>

  <text x="450" y="1188" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">SmartBooking — Proyecto Final de Ciclo — 2026</text>
</svg>