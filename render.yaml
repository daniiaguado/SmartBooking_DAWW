services:
  - type: web
    name: smartbooking
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartbooking-db
          property: connectionString

databases:
  - name: smartbooking-db
    databaseName: smartbooking
    user: smartbooking
